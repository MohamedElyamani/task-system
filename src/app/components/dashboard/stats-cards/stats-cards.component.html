<div class="container">
  <div class="row">
    @for(item of taskInfo(); track item.title){
      <div class="col-md-4">
      <div class="card border mt-3">
        <div class="card-body">
          <h4>{{item.title}}</h4>
          <p>{{item.length}}</p>
        </div>
      </div>
    </div>
    }
  </div>
</div>
