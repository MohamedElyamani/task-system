<div class="d-flex justify-content-between my-3">

  <button
    pButton
    label="Add Task"
    icon="pi pi-plus"
    (click)="openDialog()">
  </button>

 <p-iconfield iconPosition="left">
    <p-inputicon>
      <i class="pi pi-search"></i>
    </p-inputicon>

    <input
      pInputText
      type="text"
      (input)="dt.filterGlobal($any($event.target).value, 'contains')"
      placeholder="Search by title" />
  </p-iconfield> 

</div>

<p-table
  #dt
  [value]="tasks()"
  [paginator]="true"
  [rows]="10"
  [globalFilterFields]="['title']">

  <ng-template pTemplate="header">
  <tr>
    <th pSortableColumn="title">Title
      <p-sortIcon field="title" />
    </th>

    <th>Status</th>
    <th>Priority</th>
    <th>Description</th>
    <th pSortableColumn="dueDate">
      Due Date
      <p-sortIcon field="dueDate" />
    </th>

    <th>Actions</th>
  </tr>
</ng-template>

  <!-- body -->
   <ng-template pTemplate="body" let-task>
  <tr>

    <td>{{ task.title }}</td>
    <td>
      <p-tag
    [value]="task.status"
    [severity]="task.status === 'completed' ? 'success' : 'warn'"
    style="cursor: pointer"
    (click)="toggleStatus(task)">
  </p-tag>
    </td>

    <td>
      <p-tag [value]="task.priority"></p-tag>
    </td>

    <td>{{ task.description}}</td>
    <td>{{ task.dueDate | date }}</td>

    <td class="flex gap-2">

      <button
        pButton
        icon="pi pi-pencil"
        severity="info"
        (click)="openEditDialog(task)">
      </button>

      <button
        pButton
        icon="pi pi-trash"
        severity="danger"
        (click)="deleteRow(task.id )">
      </button>

    </td>

  </tr>
</ng-template>

</p-table>

<ng-template pTemplate="emptymessage">
  <tr>
    <td colspan="5" class="text-center">
      No tasks found.
    </td>
  </tr>
</ng-template>

<p-dialog
  header="Create Task"
  [(visible)]="displayDialog"
  [modal]="true"
  [style]="{ width: '60vw', height: '70vh' }">

  <app-create-update-task
    [task]="selectedTask"
    (close)="closeDialog()">
  </app-create-update-task>

</p-dialog>
